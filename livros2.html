<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Saúde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Acesse seu Painel</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Usuário" required>
            <input type="password" id="pass" placeholder="Senha" required>
            <button type="submit" class="btn-save">Entrar</button>
            <p>Ainda não tem conta? <a href="#" onclick="registrar()">Cadastre-se aqui</a></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
