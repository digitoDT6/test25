<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Saúde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="login-container">
    <h2 id="tituloForm">Acesse seu Painel</h2>
    <form id="loginForm">
        <input type="text" id="user" placeholder="Usuário" required>
        <input type="password" id="pass" placeholder="Senha" required>
        <button type="submit" id="btnAcao" class="btn-save">Entrar</button>
    </form>
    <p id="textoAlternar">
        Ainda não tem conta? <a href="#" id="linkCadastro">Cadastre-se aqui</a>
    </p>
</div>
